<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Snake Game</title>
    <style>
        *{
            margin: 0;
            padding: 0;

        }
        body {
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        canvas {
            background: black;
            display: block;
            margin: auto;
        }

        #gameover {
            color: red;
        }

        .controller {
            display: grid;
            grid-template-areas:
            ". up ."
            "left . right"
            ". down .";
            gap: 10px;
            width: 120px;
            margin: 50px auto;
        }

                
        button:nth-child(1) { grid-area: up; }
        button:nth-child(2) { grid-area: left; }
        button:nth-child(3) { grid-area: right; }
        button:nth-child(4) { grid-area: down; }

        button {
        width: 40px;
        height: 40px;
        font-size: 18px;
        cursor: pointer;
        }

        #start {
        margin: 20px;
        padding: 10px;
        width: 100px;
        font-size: 18px;
        font-weight: bold;
        color: white;
        background: linear-gradient(45deg, #00c6ff, #0072ff);
        border: none;
    
        cursor: pointer;
        box-shadow: 0 5px 15px rgba(0, 114, 255, 0.5);
        transition: all 0.3s ease;
        }

        #start:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(0, 114, 255, 0.8);
        }

        #start:active {
            transform: scale(0.95);
        }

       
    </style>
</head>
<body>
    <h2>Snake Game 🐍</h2>
    <p>Use Arrow Keys</p>

    <h2 id="gameover"></h2>
    <h2 id="total">Score : 0</h2>
    <button id="start">Start</button>
    <canvas id="game" width="400" height="400"></canvas>

    <br><br>
    <div class="controller">
        <button onclick="up()">↑</button>
        <button onclick="left()">←</button>
        <button onclick="right()">→</button>
        <button onclick="down()">↓</button>
    </div>

        <script>
        const start = document.getElementById('start');
        const total = document.getElementById('total');
         const gameover = document.getElementById('gameover');
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const box = 20;
        let snake = [{x:200, y:200}];
        let direction = "RIGHT";
        let food = {
            x: Math.floor(Math.random()*20)*box,
            y: Math.floor(Math.random()*20)*box
        };

 
        let score = 0;

        document.addEventListener("keydown", changeDirection);

        function changeDirection(e){
            if(e.key === "ArrowLeft" && direction !== "RIGHT")
                direction = "LEFT";

            if(e.key === "ArrowUp" && direction !== "DOWN")
                direction = "UP";

            if(e.key === "ArrowRight" && direction !== "LEFT")
                direction = "RIGHT";

            
            if(e.key === "ArrowDown" && direction !== "UP")
                direction = "DOWN";


        }

        function up(e){
             
                direction = "UP";

        }

        
        function down(e){
             
                direction = "DOWN";

        }

        
        function left(e){
             
                direction = "LEFT";

        }

        
        function right(e){
             
                direction = "RIGHT";

        }

      
        function draw(){
            ctx.fillStyle = "black";
            ctx.fillRect(0,0,400,400);
            

            for(let i=0;i<snake.length;i++){
                ctx.fillStyle = i==0 ? "lime" : "green";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
            }

            ctx.fillStyle="red";

            ctx.fillRect(food.x, food.y, box,box);

            let headX = snake[0].x;
            let headY = snake[0].y;

            if(direction==="LEFT") headX -= box;
            
            if(direction==="UP") headY -= box;
            
            if(direction==="RIGHT") headX += box;
            
            if(direction==="DOWN") headY  += box;
            
            if(headX<0 || headX>=400 || headY <0 || headY>=400){
                clearInterval(game);
                gameover.innerText = "Game Over";
                total.innerText = "Your total score is " + score;
            }

            if(headX==food.x && headY ==food.y){
                score++;
                total.innerText = "Score : " + score;
                food = {
                    x: Math.floor(Math.random()*20)*box,
                    y: Math.floor(Math.random()*20)*box
                };
            }else{
                snake.pop();
            }

            let newHead = {x:headX, y:headY};

            snake.unshift(newHead);
        }

        let game;

        start.addEventListener("click", () => {
            game = setInterval(draw,200);
        })
    </script>
</body>
</html>
