<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Add to cart</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
        }

        .product {
            border: 1px solid #ddd;
            padding: 15px;
            width: 200px;
            margin-bottom: 20px;
        }

        .cart {
            margin-top: 30px ;
        }

        button {
         padding: 5px 10px;
         cursor: pointer;
        }

        .item {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    
    <h2>Products</h2>

    <div class="product">
        <h4>Apple</h4>
        <p>1kg=2$</p>
        <button onclick="addtocart('Apple',2)">Add to Cart 🛒</button>
    </div>

    <div class="product">
        <h4>Orange</h4>
        <p>1kg=3$</p>
        <button onclick="addtocart('Orange',3)">Add to Cart 🛒</button>
    </div>

    <h2>Cart</h2>

    <div class="cart" id="cart"></div>

    <script>
        let cart = JSON.parse(localStorage.getItem('Cart')) || [];

        function saveCart () {
            localStorage.setItem ('Cart', JSON.stringify(cart));
          }

        function addtocart(name,price) {
                let item = cart.find(i => i.name === name);

            if (item) {
                item.qty++;
            } else {
                cart.push({ name,price,qty: 1});
            }
               
            saveCart();
            renderCart();
            }

        function changeQty(name, amount) {
            let item = cart.find (i => i.name === name);

            if (!item) return;

            item.qty += amount;

            if (item.qty <= 0) {
                cart = cart.filter(i => i.name !== name);
            }

            saveCart();
            renderCart();
        }

        function renderCart() {
            let cartDiv = document.getElementById('cart');
            cartDiv.innerHTML = "";

            cart.forEach(item => {
                cartDiv.innerHTML += `
            <div class= "item">
            ${item.name} - $${item.price} x ${item.qty}
            <button onclick= "changeQty ('${item.name}', 1)">+</button>
            <button onclick= "changeQty ('${item.name}', -1)">-</button>
           </div>`;
           
            });
        }

        renderCart(); 

        
    </script>
</body>
</html>
